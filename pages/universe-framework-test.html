<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Universe Framework Test | Profileverse</title>
<link rel="stylesheet" href="../css/style.css">

<style>
.page {
    width: min(900px, calc(100% - 40px));
    margin: 0 auto;
    padding: 40px 0 100px;
}

.card {
    margin-top: 24px;
    padding: 34px;
    background: rgba(18,22,43,.78);
    border: 1px solid var(--border);
    border-radius: 24px;
}

.card h1,
.card h2 {
    font-family: "Space Grotesk", sans-serif;
}

.card h1 {
    margin: 10px 0;
    font-size: clamp(3rem,8vw,5rem);
}

.result-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 14px;
    margin-top: 24px;
}

.result {
    padding: 20px;
    background: rgba(255,255,255,.035);
    border: 1px solid var(--border);
    border-radius: 16px;
}

.result span {
    color: var(--muted);
    font-size: .78rem;
    text-transform: uppercase;
}

.result strong {
    display: block;
    margin-top: 8px;
    font-size: 1.2rem;
}

@media (max-width:650px) {
    .result-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>
<div class="page-glow glow-one"></div>
<div class="page-glow glow-two"></div>

<main class="page">
    <a class="logo" href="../index.html">
        <span class="logo-icon">P</span>
        <span>Profileverse</span>
    </a>

    <section class="card">
        <p>Universal Fandom Framework</p>
        <h1 id="universeName">Loading...</h1>
        <p id="profileInfo"></p>

        <div class="result-grid">
            <div class="result">
                <span>Role</span>
                <strong id="roleResult"></strong>
            </div>

            <div class="result">
                <span>Artifact</span>
                <strong id="artifactResult"></strong>
            </div>

            <div class="result">
                <span>Companion</span>
                <strong id="companionResult"></strong>
            </div>
        </div>
    </section>
</main>

<script src="../js/universe-engine.js"></script>
<script src="../js/universes/demo-universe-data.js"></script>

<script>
const profile =
    window.ProfileverseUniverseEngine.getStoredProfile();

if (!profile) {
    window.location.href = "quiz.html";
} else {
    const generated =
        window.ProfileverseUniverseEngine.generate(
            profile,
            window.ProfileverseDemoUniverse
        );

    document.getElementById("universeName").textContent =
        generated.universeName;

    document.getElementById("profileInfo").textContent =
        `${generated.primaryArchetype} · ${generated.thinkingStyle}`;

    document.getElementById("roleResult").textContent =
        generated.results.role.name;

    document.getElementById("artifactResult").textContent =
        generated.results.artifact.name;

    document.getElementById("companionResult").textContent =
        generated.results.companion;
}
</script>
</body>
</html>
